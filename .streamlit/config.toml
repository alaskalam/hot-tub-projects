# Theme: colors + base font size (restart Streamlit after editing).
# Change backgroundColor / secondaryBackgroundColor to any hex you like.
# Docs: https://docs.streamlit.io/develop/concepts/configuration/theming-customize-fonts

[theme]
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#8dd9bf"
secondaryBackgroundColor = "#ffffff"
textColor = "#5e17eb"
font = "sans serif"
# Body text size in pixels (default is 16). Raise to 20 or 22 if you want it larger.
baseFontSize = 22
