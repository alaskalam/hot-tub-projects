# Theme colors for the whole app (restart Streamlit after editing).
# Change backgroundColor / secondaryBackgroundColor to any hex you like.
# Docs: https://docs.streamlit.io/develop/concepts/configuration/custom_theme

[theme]
base = "light"
primaryColor = "#2563eb"
